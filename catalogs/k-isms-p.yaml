# K-ISMS-P Compliance Catalog (English)
#
# K-ISMS-P (Korea Information Security Management System — Personal)
# is published by KISA (Korea Internet & Security Agency). The official
# framework is in Korean: https://www.kisa.or.kr/
#
# This file is a DERIVATIVE WORK. It contains:
#   - Official K-ISMS-P control IDs (factual, not copyrightable).
#   - English-language summaries written by the catalog author from
#     reading the Korean source. NOT verbatim translations of KISA's prose.
#   - Cross-mappings to ISO 27001:2022 Annex A controls where the
#     intent overlaps. Mappings are the author's professional judgment,
#     not an official KISA position.
#
# Provenance + license discussion: see ../SOURCES.md
#
# v0.1 ships the top 25 highest-impact controls from the K-ISMS-P
# 2.x certification framework. The full ~80-control catalog is tracked
# in GitHub issue #1 for v0.1.x weekly increments.
#
# Schema (see ../src/teammate/catalogs.py for the loader):
#
#   framework:     literal "k-isms-p"
#   version:       catalog version, semver
#   updated:       ISO 8601 date
#   source:        official source URL
#   license_note:  one-line provenance disclaimer
#   controls:      list of {id, domain, title, summary, iso_27001, severity}

framework: k-isms-p
version: "0.1.0"
updated: "2026-04-26"
source: "https://www.kisa.or.kr/"
license_note: "Control IDs and domain structure factual; English summaries are authored by this catalog's contributor, not KISA. Re-publishable under MIT."

# Domains (from the K-ISMS-P 2.x scheme):
#
#   1. Management System Establishment & Operation (관리체계 수립 및 운영)
#   2. Protection Measures Requirements (보호대책 요구사항)
#   3. Personal Information Processing Protection (개인정보 처리 단계별 요구사항)

controls:
  # ---- Domain 1: Management System ----
  - id: "1.1.1"
    domain: "Management System"
    title: "Establish and authorize the information security management system"
    summary: |
      The organization formally establishes and senior management authorizes the
      ISMS-P scope, objectives, and responsibilities. Equivalent to ISMS-P
      having a board-approved charter rather than ad-hoc team practice.
    iso_27001: ["A.5.1"]
    severity: high

  - id: "1.1.4"
    domain: "Management System"
    title: "Document the ISMS-P scope and exclusions"
    summary: |
      A written ISMS-P scope statement enumerates assets, services, locations,
      and any explicit exclusions with documented rationale. Auditors check
      this first; ambiguous scope is the most common finding.
    iso_27001: ["A.5.1", "A.5.2"]
    severity: high

  - id: "1.2.1"
    domain: "Management System"
    title: "Identify and classify information assets"
    summary: |
      Maintain a current inventory of information assets (systems, data,
      services). Classify each by sensitivity. The inventory is reviewed at
      least annually and after significant change.
    iso_27001: ["A.5.9", "A.5.12"]
    severity: high

  - id: "1.2.2"
    domain: "Management System"
    title: "Operate a risk assessment and treatment process"
    summary: |
      A defined methodology for identifying, analyzing, evaluating, and
      treating risks to information and personal data. Outputs include a risk
      register and a treatment plan with owners and deadlines.
    iso_27001: ["A.5.1", "A.8.8"]
    severity: high

  - id: "1.3.1"
    domain: "Management System"
    title: "Approve and disseminate security policies"
    summary: |
      A hierarchy of policies (top-level, domain-specific, procedures) is
      approved by senior management and made available to all relevant
      personnel. Policies are reviewed at planned intervals.
    iso_27001: ["A.5.1"]
    severity: medium

  - id: "1.4.1"
    domain: "Management System"
    title: "Internal audit of the ISMS-P"
    summary: |
      The organization performs internal audits at planned intervals. Audit
      findings are tracked through to closure. The audit program covers all
      in-scope domains and controls.
    iso_27001: ["A.5.35"]
    severity: medium

  # ---- Domain 2: Protection Measures ----
  - id: "2.1.1"
    domain: "Protection Measures"
    title: "Define and assign security roles and responsibilities"
    summary: |
      Roles for information security, personal data protection, and incident
      response are documented with clear authority. Separation of duties is
      enforced where conflicts of interest exist (e.g. dev vs deploy).
    iso_27001: ["A.5.2", "A.5.3"]
    severity: high

  - id: "2.1.3"
    domain: "Protection Measures"
    title: "Document code ownership for each repository"
    summary: |
      Every code repository in scope has documented owners responsible for
      review, merge, and on-call. CODEOWNERS files or equivalent register
      satisfies this control.
    iso_27001: ["A.5.2"]
    severity: medium

  - id: "2.5.1"
    domain: "Protection Measures"
    title: "Prevent secrets from being committed to source control"
    summary: |
      Credentials, API keys, certificates, and other secrets are never
      committed to source repositories. Pre-commit and CI scanning catches
      accidental commits. A documented rotation procedure exists for
      historical leaks.
    iso_27001: ["A.5.10", "A.8.24"]
    severity: critical

  - id: "2.5.4"
    domain: "Protection Measures"
    title: "Encrypt data at rest"
    summary: |
      Sensitive data is encrypted at rest. For Terraform state, this means
      remote backends with encryption enabled (S3 + KMS, GCS with default
      encryption, Azure with SSE). Plaintext state files in git are a
      finding.
    iso_27001: ["A.8.24"]
    severity: critical

  - id: "2.6.1"
    domain: "Protection Measures"
    title: "Restrict direct changes to protected branches"
    summary: |
      Production and integration branches require pull request review before
      merge. Direct push to protected branches is blocked except for
      explicitly authorized service accounts. GitHub branch protection
      rules satisfy this control.
    iso_27001: ["A.5.31", "A.8.32"]
    severity: high

  - id: "2.6.2"
    domain: "Protection Measures"
    title: "Restrict modification of CI/CD pipelines"
    summary: |
      Changes to CI/CD pipeline definitions on protected branches are
      reviewed by an authorized owner. Workflow files (.github/workflows/,
      .circleci/, etc.) on main are subject to mandatory review.
    iso_27001: ["A.5.31", "A.8.32"]
    severity: high

  - id: "2.6.3"
    domain: "Protection Measures"
    title: "Guard production-affecting infrastructure changes"
    summary: |
      Infrastructure-as-code changes to production environments require
      approval before apply. Local guards (pre-push hooks, Claude Code
      PreToolUse hooks blocking terraform apply on prod-tagged dirs) are
      defense in depth, not a substitute for branch protection.
    iso_27001: ["A.8.32"]
    severity: high

  - id: "2.7.4"
    domain: "Protection Measures"
    title: "Protect Terraform state from disclosure and tampering"
    summary: |
      Terraform state is stored in a remote backend with encryption enabled,
      access logged, and access restricted to authorized engineers. State
      files are never committed to git. State locking prevents concurrent
      mutations.
    iso_27001: ["A.8.24"]
    severity: critical

  - id: "2.8.1"
    domain: "Protection Measures"
    title: "Capture and retain audit logs"
    summary: |
      Security-relevant events (authentication, privilege change, data
      access, infrastructure mutation) are logged with timestamp, identity,
      and outcome. Log retention meets regulatory minimums and is documented.
    iso_27001: ["A.8.15", "A.8.17"]
    severity: high

  - id: "2.10.2"
    domain: "Protection Measures"
    title: "Pin and review dependencies"
    summary: |
      Source repositories pin dependency versions (lockfiles, requirements.txt,
      go.sum, package-lock.json). New dependencies and version bumps are
      reviewed for license, maintainer trust, and known vulnerabilities.
    iso_27001: ["A.8.30"]
    severity: high

  - id: "2.10.3"
    domain: "Protection Measures"
    title: "Automate dependency vulnerability monitoring"
    summary: |
      Dependency vulnerabilities are detected automatically (Dependabot,
      Renovate, Snyk, or equivalent). Findings are triaged within a documented
      SLA. Critical findings are tracked through to remediation.
    iso_27001: ["A.8.30"]
    severity: high

  - id: "2.10.5"
    domain: "Protection Measures"
    title: "Run pre-commit checks on developer machines"
    summary: |
      Pre-commit hooks catch policy violations (secrets, formatting,
      linting, license headers) before code reaches the remote. A documented
      .pre-commit-config.yaml or equivalent setup is in place.
    iso_27001: ["A.8.25"]
    severity: medium

  - id: "2.11.4"
    domain: "Protection Measures"
    title: "Maintain a software license file"
    summary: |
      Every distributed software artifact carries a clear license. The LICENSE
      file at the repository root is non-empty and identifies the chosen
      license. License compatibility with bundled dependencies is reviewed.
    iso_27001: ["A.5.32"]
    severity: medium

  - id: "2.11.5"
    domain: "Protection Measures"
    title: "Enforce open-source software hygiene in CI"
    summary: |
      Public repositories enforce policies in CI that prevent accidental
      disclosure of company-internal information (employer names, internal
      hostnames, real account IDs) in source code. Workflow exists, runs
      on push and pull_request, and fails the build on violation.
    iso_27001: ["A.5.36"]
    severity: medium

  - id: "2.13.1"
    domain: "Protection Measures"
    title: "Publish a security policy and contact"
    summary: |
      Software repositories publish a SECURITY.md (or equivalent) describing
      the supported versions, vulnerability disclosure process, and a
      reporting contact. Reports are acknowledged within a documented SLA.
    iso_27001: ["A.5.34"]
    severity: medium

  # ---- Domain 3: Personal Information Processing ----
  - id: "3.1.1"
    domain: "Personal Information"
    title: "Establish lawful basis for collecting personal data"
    summary: |
      Each item of personal data has a documented lawful basis (consent,
      contract, legal obligation, legitimate interest). The basis is captured
      in the data inventory.
    iso_27001: ["A.5.34"]
    severity: high

  - id: "3.2.3"
    domain: "Personal Information"
    title: "Limit personal data collection to declared purposes"
    summary: |
      Personal data is collected only for purposes declared at the point of
      collection. Repurposing data for new uses requires either fresh consent
      or a fresh legal basis.
    iso_27001: ["A.5.34"]
    severity: high

  - id: "3.5.1"
    domain: "Personal Information"
    title: "Encrypt personal data in storage and transit"
    summary: |
      Personal data is encrypted in storage and during transmission. Resident
      number (주민등록번호), passwords, and biometrics receive additional
      protection (one-way hashing, dedicated key custody).
    iso_27001: ["A.8.24", "A.8.34"]
    severity: critical

  - id: "3.7.2"
    domain: "Personal Information"
    title: "Securely dispose of personal data after retention period"
    summary: |
      Personal data is destroyed promptly when the retention period expires
      or the lawful basis no longer applies. Destruction is irreversible
      (cryptographic erasure, physical destruction) and logged.
    iso_27001: ["A.8.10"]
    severity: high
