name: Sign example attestation

# One-shot workflow_dispatch that re-generates the example PDF in
# examples/attestation.pdf and signs it with sigstore keyless via GitHub
# Actions OIDC. The resulting .pdf, .sig, and .crt are committed back
# to the repo as a follow-up commit, so anyone cloning sees a working
# verifiable artifact without ever running an OIDC flow themselves.
#
# Trigger this manually from the Actions tab AFTER the repo is public —
# the OIDC certificate's subject is bound to this workflow file path on
# the public repo, and that's the identity the README's verify command
# expects.
#
# Per Eng Review D2: the recommended sequence on launch day is
#   (a) push public; (b) run this workflow; (c) commit signed example;
#   (d) move v0.1.0 tag.

on:
  workflow_dispatch:
    inputs:
      target_path:
        description: "Path to score (default: repo root)"
        required: false
        default: "."

permissions:
  contents: write          # to commit the signed example back
  id-token: write          # to mint the OIDC token sigstore needs

jobs:
  sign:
    name: Generate + sign example attestation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package with sign extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[sign,rag]"

      - name: Run teammate score (writes vault + unsigned PDF preview)
        run: |
          teammate score "${{ github.event.inputs.target_path }}" --quiet

      - name: Sign the most recent attestation PDF
        run: |
          set -euxo pipefail
          PDF=$(ls -t compliance-vault/attestations/*.pdf | head -n 1)
          [ -n "$PDF" ] || { echo "no PDF found"; exit 1; }
          # Use the keyless flow. sigstore-python picks GitHub Actions
          # OIDC automatically when running inside a GitHub Actions job.
          python -m sigstore sign "$PDF"
          # sigstore writes <PDF>.sig + <PDF>.crt next to the input.
          ls -la "${PDF}"*

      - name: Promote signed artifact into examples/
        run: |
          set -euxo pipefail
          PDF=$(ls -t compliance-vault/attestations/*.pdf | head -n 1)
          mkdir -p examples
          cp "$PDF"      examples/attestation.pdf
          cp "${PDF}.sig" examples/attestation.pdf.sig
          cp "${PDF}.crt" examples/attestation.pdf.crt
          ls -la examples/

      - name: Commit signed example back to main
        run: |
          set -euxo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add examples/attestation.pdf examples/attestation.pdf.sig examples/attestation.pdf.crt
          if ! git diff --cached --quiet; then
            git commit -m "chore: refresh signed example attestation (sigstore keyless via Actions OIDC)"
            git push
          else
            echo "no changes to commit"
          fi
