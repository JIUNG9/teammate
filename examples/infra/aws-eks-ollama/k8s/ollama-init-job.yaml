apiVersion: batch/v1
kind: Job
metadata:
  name: ollama-pull-models
  namespace: teammate
  labels:
    app.kubernetes.io/name: ollama
    app.kubernetes.io/managed-by: teammate-phase-b
  annotations:
    # Re-run on every ArgoCD sync. Pulls are idempotent — `ollama pull`
    # is a no-op when the model is already on disk.
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ollama
        app.kubernetes.io/managed-by: teammate-phase-b
    spec:
      serviceAccountName: ollama
      restartPolicy: OnFailure
      containers:
        - name: pull
          image: curlimages/curl:8.10.1
          command:
            - sh
            - -c
            - |
              set -eu
              echo "Waiting for Ollama service to come up..."
              for i in $(seq 1 60); do
                if curl -fsS "http://ollama.teammate.svc.cluster.local:11434/" > /dev/null 2>&1; then
                  echo "Ollama is reachable."
                  break
                fi
                sleep 5
              done
              for model in llama3.2:3b nomic-embed-text; do
                echo "Pulling ${model}..."
                curl -fsS -X POST \
                  "http://ollama.teammate.svc.cluster.local:11434/api/pull" \
                  -d "{\"name\":\"${model}\"}" \
                  -H "Content-Type: application/json" \
                  > /dev/null
                echo "Done: ${model}"
              done
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "128Mi"
